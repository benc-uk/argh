name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps --manifest-path argh/Cargo.toml
      - run: echo '<meta http-equiv="refresh" content="0;url=argh/index.html">' > argh/target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: argh/target/doc
      - uses: actions/deploy-pages@v4
