<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Argh: Web / WASM Example</title>
    <style>
      body {
        margin: 0;
        background: #111;
        display: grid;
        place-items: center;
        min-height: 100vh;
        overflow-y: hidden;
      }
      canvas {
        image-rendering: pixelated;
        border: 1px solid black;
        width: 98%;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import init from "./pkg/web_wasm.js";

      const wasm = await init();
      wasm.start();

      // ptr is a raw pointer to the framebuffer PIXELS Vec<u8> on the Rust side
      const ptr = wasm.pixel_ptr();

      // Allocate ImageData over buffer in memory
      const len = wasm.width() * wasm.height() * 4;
      const pixels = new Uint8ClampedArray(wasm.memory.buffer, ptr, len);
      const imageData = new ImageData(pixels, wasm.width(), wasm.height());

      // Standard canvas stuff
      const canvas = document.getElementById("canvas");
      canvas.width = wasm.width();
      canvas.height = wasm.height();
      const ctx = canvas.getContext("2d");

      let last = 0;
      function frame(now) {
        const dt = last ? (now - last) / 1000 : 1 / 60;
        last = now;

        wasm.update(dt);
        ctx.putImageData(imageData, 0, 0);

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
